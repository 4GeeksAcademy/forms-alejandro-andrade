<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-light">

<div class="container mt-5 p-4 bg-white shadow rounded">

  <div class="mb-4">
    <h3>Payment form example</h3>
  </div>

  <form>

    <div class="mb-4">
      <div class="alert alert-danger">
        Some fields are missing
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="cardNumber" class="form-label">Card #</label>
          <input id="cardNumber" type="text" class="form-control" placeholder="XXXXXXXXXXXXXX">
        </div>

        <div class="col-md-3">
          <label for="cvc" class="form-label">CVC #</label>
          <input id="cvc" type="text" class="form-control" placeholder="0000">
        </div>

        <div class="col-md-3">
          <label for="amount" class="form-label">Amount</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input id="amount" type="text" class="form-control" placeholder="Amount">
          </div>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="firstName" class="form-label">First Name</label>
          <input id="firstName" type="text" class="form-control">
        </div>

        <div class="col-md-6">
          <label for="lastName" class="form-label">Last Name</label>
          <input id="lastName" type="text" class="form-control">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label for="city" class="form-label">City</label>
          <input id="city" type="text" class="form-control">
        </div>

        <div class="col-md-3">
          <label for="state" class="form-label">State</label>
          <select id="state" class="form-select">
            <option selected>Pick a state</option>
            <option>California</option>
            <option>Texas</option>
          </select>
        </div>

        <div class="col-md-3">
          <label for="postalCode" class="form-label">Postal Code</label>
          <input id="postalCode" type="text" class="form-control">
        </div>
      </div>

      <div class="row mb-3">

        <div class="col-md-6">
          <label class="form-label">We accept:</label>

          <div class="d-flex align-items-center gap-3 mt-2">

            <div class="form-check">
              <input class="form-check-input" type="radio" name="card" id="visa">
            </div>
            <i class="fa-brands fa-cc-visa fa-2x text-primary"></i>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="card" id="mastercard">
            </div>
            <i class="fa-brands fa-cc-mastercard fa-2x text-danger"></i>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="card" id="amex">
            </div>
            <i class="fa-brands fa-cc-amex fa-2x text-info"></i>

            <div class="form-check">
              <input class="form-check-input" type="radio" name="card" id="discover">
            </div>
            <i class="fa-brands fa-cc-discover fa-2x text-warning"></i>

          </div>
        </div>

        <div class="col-md-6">
          <label for="message" class="form-label">Message</label>
          <textarea id="message" class="form-control" rows="4"></textarea>
          <small class="text-muted">Add any notes here.</small>
        </div>

      </div>

    </div>

    <div class="d-flex justify-content-end gap-2">
      <button type="reset" class="btn btn-secondary">Cancel</button>
      <button type="submit" class="btn btn-primary">Send</button>
    </div>

  </form>

</div>

</body>
</html>
